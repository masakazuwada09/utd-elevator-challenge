<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Elevator Simulation</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body class="dark">

  <header>
    <h1>Elevator<span>.</span>Sim</h1>
    <label class="switch">
      <input type="checkbox" id="modeToggle">
      <span class="slider round"></span>
      <span class="mode-label">Light</span>
    </label>
  </header>

  <div id="container">

    <!-- LEFT: CONTROLS -->
    <div class="panel" id="controls">
      <div class="panel-header">Passengers</div>
      <div id="passengerList"></div>
      <div class="ctrl-btns">
        <button id="addPassengerBtn">+ Add Passenger</button>
        <button id="requestBtn">▶ Request Elevator</button>
      </div>
    </div>

    <!-- CENTER: BUILDING -->
    <div id="buildingWrap">
      <div id="building"></div>
    </div>

    <!-- RIGHT: HISTORY -->
    <div class="panel" id="history">
      <div class="panel-header">Completed Trips</div>
      <ul id="historyList"></ul>
      <div id="statusBar">
        <div class="dot idle" id="statusDot"></div>
        <span id="statusText">Idle — Floor 0</span>
      </div>
    </div>

  </div>

  <!-- ES modules: app.js imports elevator.js and person.js -->
  <script type="module" src="app.js"></script>

</body>
</html>
